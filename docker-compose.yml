services:
  postgres:
    image: postgres:16-alpine
    container_name: super-radio-db
    environment:
      POSTGRES_DB: super_radio_db
      POSTGRES_USER: radio_user
      POSTGRES_PASSWORD: radio_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U radio_user']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: super-radio-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@superradio.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - ./pgadmin/pgpass:/pgadmin4/pgpass
    depends_on:
      - postgres

  api:
    build: .
    container_name: super-radio-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://radio_user:radio_password@postgres:5432/super_radio_db?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-this
      PORT: 3000
      NODE_ENV: production
    ports:
      - '3000:3000'
    command: sh -c "npx prisma migrate deploy && npm start"

volumes:
  postgres_data:
  pgadmin_data:
